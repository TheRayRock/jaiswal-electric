version: "3.9"

services:
  jaiswal-electric:
    build: .
    container_name: jaiswal-electric
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - jaiswal-electric

    restart: always
